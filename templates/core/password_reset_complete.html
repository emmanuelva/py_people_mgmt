{% extends "base.html" %}

{% block content %}
<div class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-md text-center">
        <h1 class="mb-2 text-2xl font-bold text-gray-900">People Manager</h1>
        <p class="mb-6 text-sm text-gray-600">
            Your password has been set. You can now sign in with your new password.
        </p>
        <a
            href="{% url 'login' %}"
            class="inline-block w-full rounded-md bg-indigo-600 px-4 py-2 font-semibold text-white shadow-sm hover:bg-indigo-700"
        >
            Sign in
        </a>
    </div>
</div>
{% endblock %}
