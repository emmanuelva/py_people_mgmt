{% extends "base.html" %}

{% block content %}
<div class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-md">
        <h1 class="mb-2 text-center text-2xl font-bold text-gray-900">People Manager</h1>
        <p class="mb-6 text-center text-sm text-gray-600">
            Enter your email address and we'll send you a link to reset your password.
        </p>

        {% if form.non_field_errors %}
        <div class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-700">
            {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">
                    Email
                </label>
                <input
                    type="email"
                    name="{{ form.email.html_name }}"
                    id="{{ form.email.id_for_label }}"
                    autocomplete="email"
                    autofocus
                    required
                    class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm"
                >
            </div>
            <button
                type="submit"
                class="w-full rounded-md bg-indigo-600 px-4 py-2 font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
                Send reset link
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{% url 'login' %}" class="text-sm text-indigo-600 hover:text-indigo-500">
                Back to sign in
            </a>
        </div>
    </div>
</div>
{% endblock %}
